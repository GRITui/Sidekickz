name: Deploy to Vercel

# Requires repo secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# Vercel's own GitHub-integration auto-deploy must be disabled in the Vercel
# dashboard (Project Settings > Git) or every push double-deploys.
#
# workflow_dispatch lets a dashboard-only change (e.g. new env vars) force a
# fresh prod build+deploy from the Actions tab, without a throwaway commit —
# these are prebuilt deploys, so "Redeploy" in Vercel just re-serves the old
# build and won't pick up new env vars.
#
# pull_request is scoped to `opened` only: the preview builds once when a PR
# is first opened, not on every subsequent push to the branch. Production
# still deploys on every push to main (i.e. every merge).
#
# Staging gate (2026-07-23): `deploy-production` now `needs: test` — a full
# tests/run-all.sh run against the exact commit being deployed, not just
# whatever ran locally before merge. Deliberately scoped to production only;
# `deploy-preview` stays ungated so PR previews build immediately. Combined
# with the `production` environment's required-reviewer protection rule
# (set in repo Settings > Environments, not expressible in this file) for a
# second, human checkpoint after the automated one passes.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # tests/check-*.js resolve their own Chromium via
      # PLAYWRIGHT_CHROMIUM_PATH || Playwright's default lookup — leaving
      # the env var unset here lets them find the one this step installs.
      - name: Install Playwright's Chromium
        run: npx playwright install --with-deps chromium

      - name: Full regression battery
        run: bash tests/run-all.sh

  deploy-production:
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview: ${{ steps.deploy.outputs.url }}`
            })
