<!-- Freelanz app icon. Teal rounded square, marigold "F" / receipt mark.
     M1 uses this single SVG (crisp at any size, purpose "any maskable").
     PNG icons (192/512/maskable) are a later polish pass. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Freelanz">
  <rect width="512" height="512" rx="115" fill="#0F766E"/>
  <rect width="512" height="512" rx="115" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14B8A6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0F766E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- receipt tab behind the F -->
  <path d="M150 120 h150 a20 20 0 0 1 20 20 v250 l-28 -20 -28 20 -28 -20 -28 20 -28 -20 -28 20 V140 a20 20 0 0 1 20 -20 Z" fill="#FBFAF7" opacity="0.14"/>
  <!-- marigold F -->
  <path d="M196 150 h150 v46 h-100 v52 h84 v46 h-84 v98 h-50 Z" fill="#F59E0B"/>
</svg>
